services:
  postgres:
    image: postgres:latest
    container_name: postgres
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgres
    networks:
      - database

  backend:
    depends_on:
      - postgres
    container_name: backend
    build:
      context: .
      dockerfile: ./Dockerfile.backend
    environment:
      POSTGRES_HOST: postgres
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    networks:
      - database

volumes:
  postgres_data:

networks:
  database: